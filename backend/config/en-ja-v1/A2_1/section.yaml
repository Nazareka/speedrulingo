section:
  title: "Everyday interaction and te-form basics"
  description: "Elementary Japanese for linking actions with te-form, making polite requests, asking for and giving permission, talking about simple rules and prohibitions, offering help, and giving basic reasons in everyday situations."
  generation_description: "Prioritize high-utility interaction vocabulary for requests, help, permission, rules, and reasons. Favor verbs and expressions that work in classrooms, service situations, offices, and everyday public settings. Good candidate words include もう一度, まだ, rule- and help-related vocabulary, and polite service/classroom expressions."
  section_planning:
    min_sentence_introductions_per_normal_lesson: 2
    max_sentence_introductions_per_normal_lesson: 3
