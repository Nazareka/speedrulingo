section:
  title: "Free time, shopping, and past experiences"
  description: "Elementary Japanese for talking about hobbies and free-time activities, inviting someone out, saying where and how you go, talking about things you want, doing simple shopping, and describing what happened or how something was in the past."
  generation_description: "Prioritize practical outing, shopping, and transaction vocabulary. This section should almost guarantee introduction of 店, 駅, 買う, いくら, 円, and quantity expressions useful in shopping, along with common outing, travel, shopping, and event language. Use number vocabulary mainly in functional contexts such as prices, dates, event schedules, and simple quantities rather than as isolated counting lists."
  section_planning:
    min_sentence_introductions_per_normal_lesson: 2
    max_sentence_introductions_per_normal_lesson: 3
