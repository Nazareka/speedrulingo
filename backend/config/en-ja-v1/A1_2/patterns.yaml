patterns:
  - code: "GA_DEKIMASU"
    min_extra_words: 4
    max_extra_words: 8
    name: "X が できます"
    templates:
      - "X が できます"
    required_support_lexeme_refs:
      - canonical_writing_ja: "が"
        reading_kana: "が"
        pos: "particle"
    anchor_match_mode: "all_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "できる"
        reading_kana: "できる"
        pos: "verb"
      - canonical_writing_ja: "ます"
        reading_kana: "ます"
        pos: "auxiliary"
    short_description: "Ability with hobbies, sports, languages, or instruments."

  - code: "O_KUDASAI"
    min_extra_words: 3
    max_extra_words: 6
    name: "X を ください"
    templates:
      - "X を ください"
      - "X、ください"
    required_support_lexeme_refs:
      - canonical_writing_ja: "を"
        reading_kana: "を"
        pos: "particle"
    anchor_match_mode: "all_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "ください"
        reading_kana: "ください"
        pos: "expression"
    short_description: "Basic shopping or ordering request for an item."

  - code: "MASENKA_INVITATION"
    min_extra_words: 2
    max_extra_words: 5
    name: "Vませんか"
    templates:
      - "Vませんか"
    anchor_match_mode: "all_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "ませんか"
        reading_kana: "ませんか"
        pos: "expression"
    short_description: "Polite invitation pattern."

  - code: "MASHOU_SUGGESTION"
    min_extra_words: 1
    max_extra_words: 3
    name: "Vましょう"
    templates:
      - "Vましょう"
    required_support_lexeme_refs:
      - canonical_writing_ja: "ましょう"
        reading_kana: "ましょう"
        pos: "auxiliary"
    short_description: "Let's do it / suggestion pattern."

  - code: "NI_DESTINATION"
    min_extra_words: 3
    max_extra_words: 6
    name: "X に 行きます / 来ます / 帰ります"
    templates:
      - "PLACE に 行きます"
      - "PLACE に 来ます"
      - "PLACE に 帰ります"
    required_support_lexeme_refs:
      - canonical_writing_ja: "に"
        reading_kana: "に"
        pos: "particle"
    anchor_match_mode: "any_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "行く"
        reading_kana: "いく"
        pos: "verb"
      - canonical_writing_ja: "来る"
        reading_kana: "くる"
        pos: "verb"
      - canonical_writing_ja: "帰る"
        reading_kana: "かえる"
        pos: "verb"
    short_description: "Destination marking with go, come, and return."

  - code: "DE_MEANS"
    min_extra_words: 3
    max_extra_words: 6
    name: "X で Vます"
    templates:
      - "MEANS で Vます"
    required_support_lexeme_refs:
      - canonical_writing_ja: "で"
        reading_kana: "で"
        pos: "particle"
    short_description: "Means or method marking, especially transportation."

  - code: "VERB_STEM_NI_IKU"
    min_extra_words: 3
    max_extra_words: 6
    name: "V-stem に 行きます"
    templates:
      - "V-stem に 行きます"
    required_support_lexeme_refs:
      - canonical_writing_ja: "に"
        reading_kana: "に"
        pos: "particle"
    anchor_match_mode: "all_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "行く"
        reading_kana: "いく"
        pos: "verb"
      - canonical_writing_ja: "ます"
        reading_kana: "ます"
        pos: "auxiliary"
    short_description: "Going somewhere to do an activity."

  - code: "GA_HOSHII_DESU"
    min_extra_words: 4
    max_extra_words: 7
    name: "X が ほしいです"
    templates:
