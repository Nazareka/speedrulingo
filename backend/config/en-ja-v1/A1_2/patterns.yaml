    anchor_match_mode: "all_of"
    anchor_lexeme_refs:
      - canonical_writing_ja: "ほしい"
        reading_kana: "ほしい"
        pos: "adjective_i"
    short_description: "Saying that you want an item."

  - code: "NI_IKITAI_DESU"
