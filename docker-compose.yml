x-backend-service: &backend-service
  image: speedrulingo-backend:dev

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: speedrulingo
      POSTGRES_PASSWORD: speedrulingo
      POSTGRES_DB: speedrulingo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U speedrulingo']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *backend-service
    build:
      context: ./backend
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    env_file:
      - ./backend/.env
    environment:
      SPEEDRULINGO_DATABASE_URL: postgresql+psycopg://speedrulingo:speedrulingo@db:5432/speedrulingo
      SPEEDRULINGO_DBOS_SYSTEM_DATABASE_URL: postgresql+psycopg://speedrulingo:speedrulingo@db:5432/speedrulingo_dbos
      SPEEDRULINGO_REDIS_URL: redis://redis:6379/0
      SPEEDRULINGO_JWT_SECRET: dev-secret-change-me-minimum-32-chars
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  course-builder-ui:
    <<: *backend-service
    working_dir: /app
    command: python -m reflex run --frontend-port 3002 --backend-port 8001 --backend-host 0.0.0.0
    env_file:
      - ./backend/.env
    environment:
      SPEEDRULINGO_DATABASE_URL: postgresql+psycopg://speedrulingo:speedrulingo@db:5432/speedrulingo
      SPEEDRULINGO_DBOS_SYSTEM_DATABASE_URL: postgresql+psycopg://speedrulingo:speedrulingo@db:5432/speedrulingo_dbos
      SPEEDRULINGO_REDIS_URL: redis://redis:6379/0
      SPEEDRULINGO_JWT_SECRET: dev-secret-change-me-minimum-32-chars
    volumes:
      - ./backend:/app
    ports:
      - '3001:3002'
      - '8001:8001'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -x node_modules/.bin/vite ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
